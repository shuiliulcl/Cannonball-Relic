<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cannonball Relic</title>
  </head>
  <body>
    <main id="app">
      <section class="stage-shell">
        <div id="sceneRoot" class="scene-root"></div>
        <section class="game-hud" aria-label="Game status">
          <div class="hp-panel">
            <div class="heart">HP</div>
            <div class="hp-frame">
              <div id="hpFill" class="hp-fill"></div>
              <strong id="hp">5/5</strong>
            </div>
          </div>

          <div class="progress-panel">
            <span class="progress-node current">S</span>
            <div class="progress-track">
              <div id="progressFill" class="progress-fill"></div>
            </div>
            <span class="progress-node">B</span>
            <span class="progress-wave">Wave <strong id="wave">1</strong></span>
          </div>

          <div class="controls-panel">
            <span class="panel-title">Controls</span>
            <div class="control-grid">
              <span>WASD</span>
              <span>Move</span>
              <span>Hold LMB</span>
              <span>Aim</span>
              <span>Release</span>
              <span>Fire</span>
              <span>RMB</span>
              <span>Recall</span>
            </div>
          </div>

          <div class="buff-panel">
            <span class="panel-title">Buff</span>
            <div class="buff-icon">M</div>
            <div class="buff-meter">
              <div id="chargeFill" class="charge-fill"></div>
              <strong id="charge">0%</strong>
            </div>
            <div class="buff-readout">
              <span>Score <strong id="score">0</strong></span>
              <span id="marbleState">ready</span>
              <span id="damageScale">x1</span>
            </div>
          </div>
        </section>
        <div id="startOverlay" class="overlay">
          <h1>Cannonball Relic</h1>
          <p>WASD move. Hold left mouse to aim, release to fire. Right mouse recalls the marble.</p>
          <button id="startButton" type="button">Start</button>
        </div>
        <div id="resultOverlay" class="overlay result-overlay" hidden>
          <span id="resultKicker" class="result-kicker">Run Complete</span>
          <h1 id="resultTitle">Victory</h1>
          <p id="resultSummary">Score 0</p>
          <button id="restartButton" type="button">Restart</button>
        </div>

        <section id="upgradePanel" class="upgrade-panel" hidden>
          <h2>Choose Upgrade</h2>
          <div id="upgradeChoices" class="upgrade-choices"></div>
        </section>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
