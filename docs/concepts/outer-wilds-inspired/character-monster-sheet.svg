<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="82%">
      <stop offset="0%" stop-color="#172c35"/>
      <stop offset="58%" stop-color="#071016"/>
      <stop offset="100%" stop-color="#020407"/>
    </radialGradient>
    <radialGradient id="amber" cx="50%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#fff1a8"/>
      <stop offset="42%" stop-color="#ffba58"/>
      <stop offset="100%" stop-color="#9d3d24"/>
    </radialGradient>
    <radialGradient id="cyanCore" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#eaffff"/>
      <stop offset="42%" stop-color="#4eeaf0"/>
      <stop offset="100%" stop-color="#147e91"/>
    </radialGradient>
    <radialGradient id="violet" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#f1d7ff"/>
      <stop offset="44%" stop-color="#9a55ff"/>
      <stop offset="100%" stop-color="#2a123d"/>
    </radialGradient>
    <filter id="glow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rough" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="3" seed="14"/>
      <feDisplacementMap in="SourceGraphic" scale="4"/>
    </filter>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="4" seed="45"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.16"/></feComponentTransfer>
      <feBlend mode="overlay" in2="SourceGraphic"/>
    </filter>
    <style>
      .label { fill: #f4f1df; font-family: "Segoe UI", Arial, sans-serif; font-size: 18px; font-weight: 700; }
      .note { fill: #adc4c9; font-family: "Segoe UI", Arial, sans-serif; font-size: 13px; }
      .tiny { fill: #86a8af; font-family: "Segoe UI", Arial, sans-serif; font-size: 12px; }
      .panel { fill: #0b141b; stroke: #263944; stroke-width: 2; opacity: 0.86; }
    </style>
  </defs>

